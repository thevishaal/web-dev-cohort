<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      div {
        margin-bottom: 2rem;
        text-align: center;
        width: 100%;
        max-width: 700px;
      }

      input {
        background-color: #2d2d2d;
        border: 2px solid #3a3a3a;
        color: #e0e0e0;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border-radius: 6px;
        transition: all 0.3s ease;
        width: 100%;
        max-width: 400px;
      }

      input:focus {
        outline: none;
        border-color: #ff8c00;
        background-color: #323232;
        box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
      }

      input::placeholder {
        color: #888;
      }

      button {
        background-color: #ff8c00;
        color: #fff;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        margin-left: 0.5rem;
      }

      button:hover {
        background-color: #ff7700;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      ul {
        list-style: none;
      }

      li {
        background-color: #2d2d2d;
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid #ff8c00;
        transition: all 0.3s ease;
      }

      li:hover {
        background-color: #333333;
        transform: translateX(4px);
      }

      li button {
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
        background-color: #ff6b6b;
        margin-left: auto;
      }

      li button:hover {
        background-color: #ff5252;
      }
    </style>
  </head>
  <body>
    <div>
      <input id="inputTodo" type="text" placeholder="enter your todo" />
      <button id="addTodoBtn">Add</button>
    </div>
    <div>
      <ul id="todoContainer">
        <li>Do js <button>X</button></li>
        <li>Practice js <button>X</button></li>
      </ul>
    </div>
    <script>
      const addTodoBtnRef = document.getElementById("addTodoBtn");
      const inputTodoRef = document.getElementById("inputTodo");
      const todoContainerRef = document.getElementById("todoContainer");

      addTodoBtnRef.addEventListener("click", function () {
        const value = inputTodoRef.value;

        if (value === "") {
          window.alert("To do should not be empty.");
        } else {
          const li = document.createElement("li"); // <li></li>
          li.innerText = value; // <li>{value}</li>

          //   const editBtn = document.createElement("button");
          //   editBtn.innerText = "edit";
          //   li.appendChild(editBtn);

          //   editBtn.addEventListener("click", function () {
          //     inputTodoRef.value = li.textContent;
          //     addTodoBtnRef.innerText = "Edit";
          //   });

          //   editBtn.addEventListener("click", function (e) {
          //     let userInput = prompt(li.value);
          //     console.log(userInput);
          //   });

          //   addTodoBtnRef.innerText = "Add";

          const deleteBtn = document.createElement("button");
          deleteBtn.innerText = "X";
          li.appendChild(deleteBtn);
          todoContainerRef.appendChild(li);
          // li.addEventListener("dblclick", function () {
          //   li.remove();
          // });
          deleteBtn.addEventListener("click", function () {
            li.remove();
          });
          inputTodoRef.value = "";
        }
      });
    </script>
  </body>
</html>
